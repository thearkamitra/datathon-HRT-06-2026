[project]
name = "datathon-hrt-06-2026"
version = "0.1.0"
description = "Financial portfolio decision making based on headline sentiment"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "pandas",
    "pyarrow",
    "google-genai",
    "numpy",
    "python-dotenv",
    "requests",
    "tqdm",
    "scikit-learn>=1.6.1",
    "matplotlib>=3.9.4",
]

[project.scripts]
headline-analyzer = "src.main:main"

[tool.uv]
dev-dependencies = [
    "pytest",
    "black",
    "isort",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
